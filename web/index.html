  <script type="module">
    // Import the functions you need from the SDKs you need
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, connectAuthEmulator } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    // import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";

    // Your web app's Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyBGNXDM8_bX1lztoD70BFyZ2qlk4PvziU8",
      authDomain: "roastplus-app.firebaseapp.com",
      projectId: "roastplus-app",
      storageBucket: "roastplus-app.firebasestorage.app",
      messagingSenderId: "330871937318",
      appId: "1:330871937318:web:d4f31865d8c0e924d0c9e7",
      // measurementId: "G-37TB0Z23XQ"
    };

    // Check if Firebase is already initialized
    let app;
    try {
      const apps = getApps();
      if (apps.length === 0) {
        // Initialize Firebase only if not already initialized
        app = initializeApp(firebaseConfig);
        console.log('Firebase initialized in index.html');
        console.log('Firebase config:', firebaseConfig);
      } else {
        // Use existing app
        app = apps[0];
        console.log('Using existing Firebase app');
      }
    } catch (error) {
      console.error('Firebase initialization error:', error);
      console.error('Error details:', error.message, error.stack);
      // Try to initialize anyway
      try {
        app = initializeApp(firebaseConfig);
        console.log('Firebase initialized after error recovery');
      } catch (retryError) {
        console.error('Firebase initialization failed completely:', retryError);
        console.error('Retry error details:', retryError.message, retryError.stack);
        // アプリの起動を継続するため、エラーを無視
        app = null;
      }
    }

    // Firebase アプリが正常に初期化された場合のみ認証を初期化（Analyticsは一時的に無効化）
    if (app) {
      try {
        const auth = getAuth(app);
        console.log('Firebase Auth initialized successfully');
        console.log('Auth domain:', firebaseConfig.authDomain);
        
        // 認証状態の変更を監視
        auth.onAuthStateChanged((user) => {
          if (user) {
            console.log('User signed in:', user.email);
          } else {
            console.log('User signed out');
          }
        });
        
        // const analytics = getAnalytics(app);
        // console.log('Firebase Analytics initialized successfully');
      } catch (error) {
        console.error('Firebase Auth initialization error:', error);
        console.error('Auth error details:', error.message, error.stack);
      }
    } else {
      console.error('Firebase app is null, cannot initialize Auth');
    }
  </script>

  <script>
    console.log('index.html: スクリプト読み込み開始');

    // Flutter初期化エラーの監視

    });
    
    // ページ読み込み完了の監視
    window.addEventListener('load', function () {
      console.log('index.html: ページ読み込み完了');
      
      // Flutterアプリの状態をチェック

        const flutterApp = document.querySelector('flt-glass-pane');
        if (flutterApp) {
          console.log('Flutter: アプリ要素が見つかりました', flutterApp);
        } else {
          console.error('Flutter: アプリ要素が見つかりません');
        }
      }, 2000);
    });
    
    // エラーハンドリング
    window.addEventListener('error', function (event) {
      console.error('JavaScript: エラーが発生しました', event.error);
    });
    
    window.addEventListener('unhandledrejection', function (event) {
      console.error('JavaScript: 未処理のPromise拒否', event.reason);
    });
  </script>
