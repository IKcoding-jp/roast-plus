# Jekyll設定ファイル
# GitHub Pagesで使用される設定

# サイトの基本情報
title: Roast Plus
description: コーヒー焙煎管理アプリ
url: "https://IKcoding-jp.github.io"
baseurl: "/roast-plus"

# ビルド設定
markdown: kramdown
highlighter: rouge

# プラグイン
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# 除外ファイル
exclude:
  - README.md
  - README_website.md
  - pubspec.yaml
  - pubspec.lock
  - android/
  - ios/
  - lib/
  - test/
  - build/
  - .gitignore
  - .git/
  - .vscode/
  - .idea/

# デフォルト設定
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
