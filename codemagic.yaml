workflows:
  ios-workflow:
    name: iOS Build
    environment:
      xcode: latest
      cocoapods: default
      node: latest
      flutter: stable
      vars:
        XCODE_PROJECT: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
        BUNDLE_ID: "com.example.roastplus"
        TEAM_ID: "MC82QDYNZR"
        PROVISIONING_PROFILE_SPECIFIER: "RoastPlus ios_app_development 1756620590"
        CODE_SIGN_IDENTITY: "iPhone Developer"
        DEVELOPMENT_TEAM: "MC82QDYNZR"
      groups:
        - app_store_credentials
    scripts:
      - name: Set up code signing settings
        script: |
          keychain_name="codemagic.keychain"
          keychain_password="temp"
          
          # Create keychain
          security create-keychain -p "$keychain_password" "$keychain_name"
          security list-keychains -s "$keychain_name"
          security default-keychain -s "$keychain_name"
          security unlock-keychain -p "$keychain_password" "$keychain_name"
          security set-keychain-settings -t 3600 -l ~/Library/Keychains/"$keychain_name"
          
          # Import certificate
          echo "$CM_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security import /tmp/certificate.p12 -k "$keychain_name" -P "$CM_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_name"
          
          # Import provisioning profile
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > /tmp/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          
          # Set up code signing settings
          /usr/libexec/PlistBuddy -c "Set :method development" /tmp/exportOptions.plist
          /usr/libexec/PlistBuddy -c "Set :teamID $CM_TEAM_ID" /tmp/exportOptions.plist
          /usr/libexec/PlistBuddy -c "Set :provisioningProfiles:$CM_BUNDLE_ID $CM_PROVISIONING_PROFILE_SPECIFIER" /tmp/exportOptions.plist
          /usr/libexec/PlistBuddy -c "Set :signingCertificate $CM_CODE_SIGN_IDENTITY" /tmp/exportOptions.plist
          /usr/libexec/PlistBuddy -c "Set :signingStyle manual" /tmp/exportOptions.plist
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Clean iOS build
        script: |
          cd ios
          rm -rf Pods
          rm -rf .symlinks
          rm -rf Podfile.lock
          rm -rf Runner.xcworkspace
          cd ..
      - name: Install iOS dependencies
        script: |
          cd ios
          pod install --repo-update
          cd ..
      - name: Build iOS app
        script: |
          flutter build ipa \
            --debug \
            --export-options-plist /tmp/exportOptions.plist \
            --build-number=$CM_BUILD_NUMBER
      - name: Generate Flutter frameworks
        script: |
          echo "Flutterフレームワーク生成を開始します..."
          
          # フレームワーク出力ディレクトリを設定
          FRAMEWORK_OUTPUT_DIR="build/ios/frameworks"
          mkdir -p "$FRAMEWORK_OUTPUT_DIR"
          
          echo "出力ディレクトリ: $FRAMEWORK_OUTPUT_DIR"
          
          # Flutterのキャッシュを更新
          echo "Flutterのキャッシュを更新中..."
          flutter precache --ios
          
          # iOSプロジェクトディレクトリに移動
          cd ios
          
          # Flutter.frameworkを生成
          echo "Flutter.frameworkを生成中..."
          flutter build ios --debug --no-codesign
          
          # フレームワークの場所を確認
          FLUTTER_FRAMEWORK_SOURCE="../build/ios/Debug-iphoneos/Flutter.framework"
          if [ -d "$FLUTTER_FRAMEWORK_SOURCE" ]; then
            echo "Flutter.frameworkをコピー中..."
            cp -R "$FLUTTER_FRAMEWORK_SOURCE" "../$FRAMEWORK_OUTPUT_DIR/"
          else
            echo "警告: Flutter.frameworkが見つかりません: $FLUTTER_FRAMEWORK_SOURCE"
          fi
          
          # Flutter-ObjC.frameworkを生成
          echo "Flutter-ObjC.frameworkを生成中..."
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build \
            -archivePath build/Runner.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
          
          # アーカイブからフレームワークを抽出
          ARCHIVE_FRAMEWORKS_DIR="build/Runner.xcarchive/Products/Applications/Runner.app/Frameworks"
          if [ -d "$ARCHIVE_FRAMEWORKS_DIR" ]; then
            echo "アーカイブからフレームワークを抽出中..."
            cp -R "$ARCHIVE_FRAMEWORKS_DIR"/* "../$FRAMEWORK_OUTPUT_DIR/"
          else
            echo "警告: アーカイブ内にフレームワークディレクトリが見つかりません: $ARCHIVE_FRAMEWORKS_DIR"
          fi
          
          cd ..
          
          # 生成されたフレームワークの内容を確認
          echo "生成されたフレームワークの内容:"
          if [ -d "$FRAMEWORK_OUTPUT_DIR" ]; then
            ls -la "$FRAMEWORK_OUTPUT_DIR"
            
            # フレームワークの詳細情報を表示
            for framework in "$FRAMEWORK_OUTPUT_DIR"/*.framework; do
              if [ -d "$framework" ]; then
                echo "フレームワーク: $(basename "$framework")"
                echo "  サイズ: $(du -sh "$framework" | cut -f1)"
                echo "  内容:"
                ls -la "$framework"
              fi
            done
          else
            echo "フレームワークディレクトリが存在しません"
          fi
          
          echo "Flutterフレームワークの生成が完了しました"
          echo "出力場所: $FRAMEWORK_OUTPUT_DIR"
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/frameworks/**/*
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: false

