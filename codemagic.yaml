workflows:
  ios_debug:
    name: iOS Debug (no codesign)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: 15.4
      vars:
        COCOAPODS_DISABLE_STATS: 'true'
        LC_ALL: en_US.UTF-8
        LANG: en_US.UTF-8
    cache:
      cache_paths:
        - "$HOME/Library/Caches/CocoaPods"
        - "$HOME/.cocoapods/repo"
        - "$FLUTTER_ROOT/.pub-cache"
        - "ios/Pods"
    scripts:
      - name: Flutter deps
        script: |
          flutter --version
          flutter clean
          flutter pub get
      - name: Prepare CocoaPods (repo update + install)
        script: |
          cd ios
          rm -rf Podfile.lock Pods
          pod repo update
          pod install --repo-update
          cd ..
      - name: Build iOS (debug)
        script: |
          flutter build ios --debug --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
      - build/ios/**/*.xcarchive
      - build/**/xcresults/**/*.xcresult

