name: bysnapp
description: "ローストプラス"
publish_to: 'none'

version: 0.5.7

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3
  google_fonts: ^6.1.0
  audioplayers: ^5.2.1
  fl_chart: ^0.66.2
  google_sign_in: ^6.1.5
  firebase_core: ^2.30.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_storage: ^11.6.10
  image_picker: ^1.0.7
  permission_handler: ^11.3.1
  flutter_colorpicker: ^1.1.0
  url_launcher: ^6.2.5
  image: ^4.1.7
  table_calendar: ^3.0.9
  flutter_local_notifications: ^17.2.2
  android_intent_plus: ^4.0.3
  package_info_plus: ^8.0.2
  device_info_plus: ^10.1.0
  google_mobile_ads: ^6.0.0
  in_app_purchase: ^3.2.3
  lottie: ^3.1.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/sounds/alarm/
    - assets/sounds/notification/
    - assets/fonts/
    - assets/animations/
    - assets/launcher_icon/icon.png
    - assets/google_logo.png
  fonts:
    - family: ZenMaruGothic
      fonts:
        - asset: assets/fonts/ZenMaruGothic-Regular.ttf
    - family: utsukushiFONT
      fonts:
        - asset: assets/fonts/UtsukushiFONT.otf
    - family: KiwiMaru
      fonts:
        - asset: assets/fonts/KiwiMaru-Regular.ttf
    - family: HannariMincho
      fonts:
        - asset: assets/fonts/HannariMincho-Regular.otf
    - family: Harenosora
      fonts:
        - asset: assets/fonts/Harenosora.otf

# パフォーマンス最適化設定
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/launcher_icon/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/launcher_icon/icon.png"